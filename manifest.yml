modules:
  jira:projectPage:
    - key: forge-jira-starter-project-page
      resource: main
      resolver:
        function: resolver
      title: Forge JIRA Starter
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: static/ui/build
permissions:
  scopes:
    - read:jira-user
    - read:board-scope:jira-software
    - read:project:jira
    - read:jira-work
app:
  runtime:
    name: nodejs22.x
    memoryMB: 256
    architecture: arm64
